[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
childlogdir=/tmp

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[program:hermes-gateway]
command=/opt/hermes/.venv/bin/hermes gateway run
directory=/opt/hermes
autostart=true
autorestart=true
priority=10
startsecs=5
stdout_logfile=/tmp/%(program_name)s.out.log
stdout_logfile_maxbytes=0
stderr_logfile=/tmp/%(program_name)s.err.log
stderr_logfile_maxbytes=0
environment=GATEWAY_ALLOW_ALL_USERS="true",HERMES_HOME="/opt/data",HERMES_DATA_DIR="/opt/data",HOME="/opt/data",PATH="/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

[program:hermes-dashboard]
command=/opt/hermes/.venv/bin/hermes dashboard --host 0.0.0.0 --port 9119 --insecure --no-open
directory=/opt/hermes
autostart=true
autorestart=true
priority=20
startsecs=5
stdout_logfile=/tmp/%(program_name)s.out.log
stdout_logfile_maxbytes=0
stderr_logfile=/tmp/%(program_name)s.err.log
stderr_logfile_maxbytes=0
environment=HERMES_HOME="/opt/data",HERMES_DATA_DIR="/opt/data",HOME="/opt/data",PATH="/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

[program:hermes-webui]
command=/opt/hermes-webui/venv/bin/python /opt/hermes-webui/server.py
directory=/opt/hermes-webui
autostart=true
autorestart=true
priority=30
startsecs=5
stdout_logfile=/tmp/%(program_name)s.out.log
stdout_logfile_maxbytes=0
stderr_logfile=/tmp/%(program_name)s.err.log
stderr_logfile_maxbytes=0
environment=HERMES_WEBUI_HOST="0.0.0.0",HERMES_WEBUI_PORT="8787",HERMES_WEBUI_STATE_DIR="/opt/data/webui",HERMES_WEBUI_DEFAULT_WORKSPACE="/workspace",HERMES_WEBUI_AGENT_DIR="/opt/hermes",HERMES_HOME="/opt/data",HERMES_DATA_DIR="/opt/data",HOME="/opt/data",PATH="/opt/hermes-webui/venv/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
