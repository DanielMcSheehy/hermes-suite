# =============================================================================
# Hermes Suite — docker-compose.yaml
#
# Single-container setup: all services in one image.
# No UID/GID sharing issues — everything runs as the same user.
#
# Usage:
#   podman-compose up -d
#   podman-compose logs -f
#   podman-compose down
#
# For Docker, replace podman-compose with docker compose.
# =============================================================================

services:
  hermes-suite:
    build:
      context: .
      dockerfile: Dockerfile
    image: ascensionoid/hermes-suite:2026.5.7-0.51.44
    restart: unless-stopped

    ports:
      - "8642:8642"
      - "8787:8787"
      - "9119:9119"

    volumes:
      - hermes-data:/opt/data
      - hermes-workspace:/workspace
      - /etc/localtime:/etc/localtime:ro

    environment:
      - NODE_ENV=production
      - HERMES_HOME=/opt/data
      - HERMES_DATA_DIR=/opt/data
      - PATH=/opt/hermes/.venv/bin:/opt/hermes-webui/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  hermes-data:
  hermes-workspace:
