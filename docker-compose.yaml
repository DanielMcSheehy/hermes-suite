# =============================================================================
# Hermes Suite — docker-compose.yaml
#
# Single-container setup: all services in one image.
# No UID/GID sharing issues — everything runs as the same user.
#
# Usage:
#   podman-compose up -d
#   podman-compose logs -f
#   podman-compose down
#
# For Docker, replace podman-compose with docker compose.
# =============================================================================

services:
  hermes-suite:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-suite-coolify:1
    pull_policy: build
    restart: unless-stopped

    ports:
      - "8642:8642"
      - "8787:8787"
      - "9119:9119"

    volumes:
      - hermes-data:/opt/data
      - hermes-workspace:/workspace
      - /etc/localtime:/etc/localtime:ro

    environment:
      - NODE_ENV=production
      - HERMES_HOME=/opt/data
      - HERMES_DATA_DIR=/opt/data
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR: /opt/data/webui
      - HERMES_WEBUI_DEFAULT_WORKSPACE: /workspace
      - HERMES_WEBUI_AGENT_DIR: /opt/hermes
      - GATEWAY_ALLOW_ALL_USERS: "true"
      - HERMES_WEBUI_PASSWORD=change-this-password
      - PATH=/opt/hermes/.venv/bin:/opt/hermes-webui/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

volumes:
  hermes-data:
  hermes-workspace:
